<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Weather Memory Match - Phiên bản 22:02</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .card { perspective: 1000px; cursor: pointer; height: 128px; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; position: relative; width: 100%; height: 100%; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .card-back { transform: rotateY(180deg); background: white; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto text-center">
        <h1 class="text-4xl font-extrabold text-blue-900 mb-2">Weather Memory Match</h1>
        <p id="status" class="text-slate-500 mb-6">Đang khởi tạo trò chơi...</p>
        <div id="game-board" class="grid grid-cols-4 gap-4 max-w-2xl mx-auto"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let flippedCards = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const imagesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'images');
                
                onSnapshot(imagesRef, (snapshot) => {
                    const board = document.getElementById('game-board');
                    board.innerHTML = '';
                    const items = [];
                    snapshot.forEach(doc => items.push({id: doc.id, src: doc.data().base64}));
                    
                    if (items.length === 0) {
                        document.getElementById('status').innerText = "Chưa có học liệu. Hãy thêm ảnh vào thư mục cá nhân.";
                        return;
                    }

                    document.getElementById('status').innerText = "Trò chơi sẵn sàng!";
                    const deck = [...items, ...items].sort(() => Math.random() - 0.5);

                    deck.forEach((item) => {
                        const card = document.createElement('div');
                        card.className = "card";
                        card.innerHTML = `
                            <div class="card-inner shadow-xl">
                                <div class="card-front bg-blue-600 text-white text-3xl font-bold">?</div>
                                <div class="card-back"><img src="${item.src}" class="w-full h-full object-cover"></div>
                            </div>
                        `;
                        card.onclick = () => {
                            if (flippedCards.length < 2 && !card.classList.contains('flipped')) {
                                card.classList.add('flipped');
                                flippedCards.push({card, id: item.id});
                                if (flippedCards.length === 2) setTimeout(checkMatch, 800);
                            }
                        };
                        board.appendChild(card);
                    });
                });
            } else {
                signInAnonymously(auth);
            }
        });

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.id !== c2.id) {
                c1.card.classList.remove('flipped');
                c2.card.classList.remove('flipped');
            }
            flippedCards = [];
        }
    </script>
</body>
</html>
